# Docker Compose configuration for OCR Pipeline (Compose v2)
version: '3.8'

services:
  ocr:
    build: .
    image: tokenworks-ocr:latest
    working_dir: /app
    
    # Bind mount the entire repo so code changes and output persist on host
    volumes:
      - ./:/app
    
    # Default command: process the sample PDF
    # Override with: docker compose run --rm ocr "path/to/your/file.pdf"
    command: ["data/input/Innaya_v2 copy.pdf"]
    
    # Platform override options (uncomment if needed):
    # Force Apple Silicon (ARM64):
    # platform: linux/arm64
    # Force Intel/AMD64 (Windows, Intel Macs, most Linux):
    # platform: linux/amd64
    # 
    # By default, Docker Desktop automatically pulls the right architecture
    # for your system from multi-arch base images
    
    # Linux file permissions fix (uncomment for Linux hosts if needed):
    # user: "${UID:-1000}:${GID:-1000}"
    # Set UID/GID in your shell: export UID=$(id -u) GID=$(id -g)