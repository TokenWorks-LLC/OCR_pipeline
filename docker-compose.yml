# Docker Compose configuration for OCR Pipeline (devcontainer-safe baseline)

services:
  # Default service for Intel/AMD64 platforms
  ocr:
    build: .
    image: tokenworks-ocr:latest
    working_dir: /app

    # Bind mount the entire repo so code changes and output persist on host
    volumes:
      - ./:/app

    # Keep amd64 explicit because root Dockerfile is CUDA/amd64-oriented
    platform: linux/amd64

    # Safe default command for interactive/run overrides
    command: ["python", "run_pipeline.py", "--help"]
    
  # Apple Silicon service
  ocr-arm64:
    build:
      context: .
      dockerfile: Dockerfile.arm64
    image: tokenworks-ocr:latest
    working_dir: /app
    platform: linux/arm64
    volumes:
      - ./:/app
    command: ["python", "run_pipeline.py", "--help"]