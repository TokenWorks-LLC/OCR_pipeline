# Docker Compose configuration for OCR Pipeline (Compose v2)

services:
  # Default service for Intel/AMD64 platforms
  ocr:
    build: .
    image: tokenworks-ocr:latest
    working_dir: /app
    
    # Bind mount the entire repo so code changes and output persist on host
    volumes:
      - ./:/app
    
    # Default command: process the sample PDF
    # Override with: docker compose run --rm ocr "path/to/your/file.pdf"
    command: ["python", "run_pipeline.py", "data/input/Innaya_v2 copy.pdf"]
    
    # Platform-specific builds (uncomment ONE based on your system):
    
    # Intel/AMD64 (Windows, Intel Macs, most Linux servers):
    platform: linux/amd64
    
    # Apple Silicon (ARM64) - ALSO change build context to Dockerfile.arm64:
    # platform: linux/arm64
    # build:
    #   context: .
    #   dockerfile: Dockerfile.arm64
    
    # Linux file permissions fix (uncomment for Linux hosts if needed):
    # user: "${UID:-1000}:${GID:-1000}"
    # Set UID/GID in your shell: export UID=$(id -u) GID=$(id -g)

  # Alternative service for Apple Silicon users
  ocr-arm64:
    build:
      context: .
      dockerfile: Dockerfile.arm64
    image: tokenworks-ocr:latest
    working_dir: /app
    platform: linux/arm64
    volumes:
      - ./:/app
    command: ["python", "run_pipeline.py", "data/input/Innaya_v2 copy.pdf"]